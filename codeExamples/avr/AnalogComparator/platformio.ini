[env:uno]
platform = atmelavr
board = uno
framework = arduino
debug_tool = simavr
debug_build_flags = -O0 -g3 -ggdb3
build_type = debug
; Erster Halt innerhalb der Polling-Schleife (nach Init()),
; damit die Register-Ausgabe initialisierte Werte zeigt.
debug_init_break = tbreak src/main.cpp:44
debug_extra_cmds =
    set remote memory-map-packet off
    define hook-stop
    printf "ACSR    = %%c%%c%%c%%c%%c%%c%%c%%c   ACO=%%d ACI=%%d ACBG=%%d\n", ((ACSR>>7)&1)+'0', ((ACSR>>6)&1)+'0', ((ACSR>>5)&1)+'0', ((ACSR>>4)&1)+'0', ((ACSR>>3)&1)+'0', ((ACSR>>2)&1)+'0', ((ACSR>>1)&1)+'0', (ACSR&1)+'0', (ACSR>>5)&1, (ACSR>>4)&1, (ACSR>>6)&1
    printf "ADMUX   = %%c%%c%%c%%c%%c%%c%%c%%c   MUX=%%d\n", ((ADMUX>>7)&1)+'0', ((ADMUX>>6)&1)+'0', ((ADMUX>>5)&1)+'0', ((ADMUX>>4)&1)+'0', ((ADMUX>>3)&1)+'0', ((ADMUX>>2)&1)+'0', ((ADMUX>>1)&1)+'0', (ADMUX&1)+'0', ADMUX&0x0F
    printf "ADCSRA  = %%c%%c%%c%%c%%c%%c%%c%%c   ADEN=%%d\n", ((ADCSRA>>7)&1)+'0', ((ADCSRA>>6)&1)+'0', ((ADCSRA>>5)&1)+'0', ((ADCSRA>>4)&1)+'0', ((ADCSRA>>3)&1)+'0', ((ADCSRA>>2)&1)+'0', ((ADCSRA>>1)&1)+'0', (ADCSRA&1)+'0', (ADCSRA>>7)&1
    printf "ADCSRB  = %%c%%c%%c%%c%%c%%c%%c%%c   ACME=%%d\n", ((ADCSRB>>7)&1)+'0', ((ADCSRB>>6)&1)+'0', ((ADCSRB>>5)&1)+'0', ((ADCSRB>>4)&1)+'0', ((ADCSRB>>3)&1)+'0', ((ADCSRB>>2)&1)+'0', ((ADCSRB>>1)&1)+'0', (ADCSRB&1)+'0', (ADCSRB>>6)&1
    printf "PORTB   = %%c%%c%%c%%c%%c%%c%%c%%c   PB5=%%d\n", ((PORTB>>7)&1)+'0', ((PORTB>>6)&1)+'0', ((PORTB>>5)&1)+'0', ((PORTB>>4)&1)+'0', ((PORTB>>3)&1)+'0', ((PORTB>>2)&1)+'0', ((PORTB>>1)&1)+'0', (PORTB&1)+'0', (PORTB>>5)&1
    printf "DDRB    = %%c%%c%%c%%c%%c%%c%%c%%c\n", ((DDRB>>7)&1)+'0', ((DDRB>>6)&1)+'0', ((DDRB>>5)&1)+'0', ((DDRB>>4)&1)+'0', ((DDRB>>3)&1)+'0', ((DDRB>>2)&1)+'0', ((DDRB>>1)&1)+'0', (DDRB&1)+'0'
    end
