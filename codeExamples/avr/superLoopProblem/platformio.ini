; PlatformIO Project Configuration File
;
; Demonstration: Warum eine Super-Loop bei mehreren Zeitbasen versagt.
;
; Mit den drei Build-Environments lassen sich die Eskalationsstufen
; aus der Vorlesung nacheinander auf realer Hardware nachvollziehen:
;
;   pio run -e stage1_naiv     -t upload   # naive Super-Loop mit _delay_ms()
;   pio run -e stage2_timer    -t upload   # Super-Loop mit millis()-Zeitbasen
;   pio run -e stage3_freertos -t upload   # Lösung mit FreeRTOS
;
; Auf einem Logikanalysator/Oszilloskop an PIN_REGLER (D8) wird sichtbar,
; dass nur stage3 den 10-ms-Reglertakt stabil hält.

[env:stage1_naiv]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = +<stage1_naiv.cpp>

[env:stage2_timer]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = +<stage2_timer.cpp>

[env:stage3_freertos]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = +<stage3_freertos.cpp>
lib_deps = feilipu/FreeRTOS
